<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA_SYNC_V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    <div class="scanline"></div>
    <div class="container fade-in">
        <div id="topHeader" class="header">
            <button class="cyber-btn" onclick="toggleModal('playersModal')">PLAYERS_RADAR</button>
            <button id="loginBtn" class="cyber-btn" onclick="toggleModal('loginModal')">SYSTEM_LOGIN</button>
        </div>

        <h1 class="glitch" data-text="TIME_TABLE_V1">TIME_TABLE_V1</h1>
        
        <div id="timer-section">
            <h2 id="clock" class="neon-glow">00:00:00</h2>
            <h3 id="timerDisplay">SESSION: 00:00:00</h3>
        </div>

        <div class="controls">
            <button id="startBtn" class="action-btn" onclick="startStudy()">START_LEARNING</button>
            <button id="stopBtn" class="action-btn" onclick="stopStudy()">STOP_LEARNING</button>
        </div>

        <!-- THIS GRID IS NOW REINFORCED -->
        <div id="grid-container">
            <div id="grid"></div>
        </div>
    </div>

    <!-- DYNAMIC POPUP (Fixed Closing) -->
    <div id="mainPopup" class="modal-overlay" onclick="closePopupExternal(event)">
        <div id="popupWindow" class="popup-box">
            <div id="popupHeader">
                <span id="popupTitle">SYSTEM_INFO</span>
                <button class="close-btn" onclick="toggleModal('mainPopup')">✕</button>
            </div>
            <div id="popupContent"></div>
        </div>
    </div>

    <!-- ADMIN 999 CORE -->
    <div id="adminModal" class="modal-overlay" onclick="closePopupExternal(event)">
        <div class="popup-box admin-box">
            <div id="popupHeader">
                <span class="glitch" style="font-size: 1.2rem;">LEVEL_999_CORE</span>
                <button class="close-btn" onclick="toggleModal('adminModal')">✕</button>
            </div>
            <div class="admin-controls">
                <label>TARGET_PLAYER:</label>
                <select id="targetPlayer">
                    <option value="MAFIADEVIL">MAFIADEVIL</option>
                    <option value="MAFIAKING">MAFIAKING</option>
                </select>
                <input type="color" id="colorPicker" value="#ff0000">
                <button class="action-btn" onclick="pushGlobalTheme()">REWRITE_THEME</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
