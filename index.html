<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA_SYNC_V1</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="theme-default">
    <div class="scanline"></div>
    <div class="container fade-in">
        <div id="topHeader" class="header">
            <button class="cyber-btn" onclick="toggleModal('playersModal')">PLAYERS_RADAR</button>
            <button id="loginBtn" class="cyber-btn" onclick="toggleModal('loginModal')">SYSTEM_LOGIN</button>
        </div>

        <h1 class="glitch" data-text="TIME_TABLE_V1">TIME_TABLE_V1</h1>
        
        <div id="timer-section">
            <h2 id="clock" class="neon-glow">00:00:00</h2>
            <h3 id="timerDisplay">SESSION: 00:00:00</h3>
        </div>

        <div class="controls">
            <button id="startBtn" class="action-btn" onclick="startStudy()">START_LEARNING</button>
            <button id="stopBtn" class="action-btn" onclick="stopStudy()">STOP_LEARNING</button>
        </div>

        <div id="grid"></div>
    </div>

    <!-- The Resizing Dynamic Pop-up (Unified Window) -->
    <div id="mainPopup" class="modal-overlay" onclick="closePopupExternal(event)">
        <div id="popupWindow" class="popup-box">
            <div id="popupHeader">
                <span id="popupTitle">SYSTEM_INFO</span>
                <button class="close-btn" onclick="toggleModal('mainPopup')">✕</button>
            </div>
            <div id="popupContent"></div>
        </div>
    </div>

    <!-- Admin Level 999 Menu -->
    <div id="adminModal" class="modal-overlay" onclick="closePopupExternal(event)">
        <div class="popup-box admin-box">
            <div id="popupHeader">
                <span class="glitch" style="font-size: 1.2rem;">LEVEL_999_CORE</span>
                <button class="close-btn" onclick="toggleModal('adminModal')">✕</button>
            </div>
            <div class="admin-controls">
                <label>TARGET_PLAYER:</label>
                <select id="targetPlayer">
                    <option value="MAFIADEVIL">MAFIADEVIL</option>
                    <option value="MAFIAKING">MAFIAKING</option>
                </select>
                <br><br>
                <label>NETWORK_OVERRIDE_COLOR:</label>
                <input type="color" id="colorPicker" value="#00ff41">
                <br><br>
                <button class="action-btn" onclick="pushGlobalTheme()">REWRITE_THEME</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal-overlay" onclick="closePopupExternal(event)">
        <div class="popup-box">
            <div id="popupHeader">
                <span>AUTHENTICATE</span>
                <button class="close-btn" onclick="toggleModal('loginModal')">✕</button>
            </div>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <div class="checkbox-row">
                <input type="checkbox" id="rememberMe"> <label>REMEMBER_ME</label>
            </div>
            <button class="action-btn" onclick="login()" style="width:100%">LOGIN</button>
        </div>
    </div>

    <!-- Players Radar -->
    <div id="playersModal" class="modal-overlay" onclick="closePopupExternal(event)">
        <div class="popup-box">
            <div id="popupHeader">
                <span>LIVE_RADAR</span>
                <button class="close-btn" onclick="toggleModal('playersModal')">✕</button>
            </div>
            <div id="playerList">Scanning Network...</div>
        </div>
    </div>

    <script type="module" src="assets/js/script.js"></script>
</body>
</html>
