<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA_SYNC_V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button class="cyber-btn" onclick="toggleModal('playersModal')">PLAYERS</button>
        <div class="user-display" id="loginBtn">MAFIAKING</div>
        <button class="cyber-btn" id="adminBtn" onclick="toggleModal('adminPanel')" style="color: gold; border-color: gold;">CORE_CONTROL</button>
    </div>

    <h1 class="glitch">T I M E _ T A B L E _ V 1</h1>
    
    <!-- Subject Grid Section -->
    <div id="grid"></div>

    <!-- Bottom Timer Section -->
    <div class="timer-box">
        <h2 id="clock">00:00:00</h2>
        <h3 id="timerDisplay">SESSION: 00:00:00</h3>
        <div class="controls">
            <button id="startBtn" class="action-btn start" onclick="startStudy()">START_LEARNING</button>
            <button id="stopBtn" class="action-btn stop" onclick="stopStudy()">STOP_LEARNING</button>
        </div>
    </div>

    <div class="network-stats">
        <div>↑ 0.5 KBps</div>
        <div>↓ 0.7 KBps</div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
