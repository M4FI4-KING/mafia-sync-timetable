<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA_SYNC_V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    <div class="scanline"></div>
    <div class="container">
        <div id="topHeader" class="header">
            <button class="cyber-btn">PLAYERS_RADAR</button>
            <button id="loginBtn" class="cyber-btn">SYSTEM_LOGIN</button>
        </div>

        <h1 class="glitch">TIME_TABLE_V1</h1>
        
        <div id="timer-section">
            <h2 id="clock">00:00:00</h2>
            <h3 id="timerDisplay">SESSION: 00:00:00</h3>
        </div>

        <div class="controls">
            <button id="startBtn" class="action-btn">START_LEARNING</button>
            <button id="stopBtn" class="action-btn">STOP_LEARNING</button>
        </div>

        <!-- This is where your cards will appear side-by-side -->
        <div id="grid"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
