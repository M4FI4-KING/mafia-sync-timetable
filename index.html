<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA_SYNC_V1</title>
    <link rel="stylesheet" href=assets/css/styles.css>
</head>
<body class="theme-red">
    <div class="container">
        <div id="topHeader" class="header">
            <button onclick="toggleModal('playersModal')">PLAYERS</button>
            <button id="loginBtn" onclick="toggleModal('loginModal')">SYSTEM_LOGIN</button>
        </div>

        <h1>TIME_TABLE_V1</h1>
        
        <div id="timer-section">
            <h2 id="clock">00:00:00</h2>
            <h3 id="timerDisplay">SESSION: 00:00:00</h3>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-glow" onclick="startStudy()">START_LEARNING</button>
            <button id="stopBtn" onclick="stopStudy()">STOP_LEARNING</button>
        </div>

        <!-- The main grid container -->
        <div id="grid">
            <!-- JavaScript will inject cards here -->
        </div>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>AUTHENTICATE</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <div class="modal-btns">
                <button onclick="login()">LOGIN</button>
                <button onclick="toggleModal('loginModal')">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="playersModal" class="modal">
        <div class="modal-content">
            <h2>LIVE_RADAR</h2>
            <div id="playerList">
                <p>Scanning network...</p>
            </div>
            <button onclick="toggleModal('playersModal')">BACK</button>
        </div>
    </div>

    <script type="module" src="assets/js/script.js"></script>
</body>
</html>
