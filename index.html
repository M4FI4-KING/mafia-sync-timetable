<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA_SYNC_V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="hacker-theme">
    <div class="container">
        <div class="header">
            <button onclick="toggleModal('playersModal')">PLAYERS</button>
            <button onclick="toggleModal('loginModal')">SYSTEM_LOGIN</button>
        </div>

        <h1>TIME_TABLE_V1</h1>
        
        <div id="timer-section">
            <h2 id="clock">00:00:00</h2>
            <p>SESSION: <span id="session-time">00:00:00</span></p>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-glow">START_LEARNING</button>
            <button id="stopBtn">STOP_LEARNING</button>
        </div>

        <div id="admin-panel" style="display:none; margin-top: 20px;">
            <button class="btn-admin" onclick="alert('LVL 999: CORE_ACCESS_OPEN')">CORE_CONTROL</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>AUTHENTICATE</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <div class="modal-btns">
                <button id="loginSubmit">LOGIN</button>
                <button onclick="toggleModal('loginModal')">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Players Radar Modal -->
    <div id="playersModal" class="modal">
        <div class="modal-content">
            <h2>LIVE_RADAR</h2>
            <div id="playerList">
                <p>Scanning network...</p>
            </div>
            <button onclick="toggleModal('playersModal')">BACK</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        // Simple UI toggle that doesn't need Firebase
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
        window.toggleModal = toggleModal;
    </script>
</body>
</html>
